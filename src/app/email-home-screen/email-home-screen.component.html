<section aria-label="Email ID Verification — choose verification method" class="pan_details_form">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-md-12 col-12 p-0 p-sm-0 m-auto">
        <div class="mobile_css">
          <div class="back_cls">
            <div class="d-flex flex-column align-items-start gap-2">
              <h5 class="">Email ID Verification</h5>
              <p class="sub_title">
                All communication related to your account will be sent to this
                email
              </p>
            </div>
          </div>
        </div>

        <form aria-label="Email Verification Form" method="post" class="">
          <div class="div">
            <div class="col-lg-12 col-md-12 col-12 desktop_css">
              <div class="header_padding">
                <div class="help_faq_css">
                  <div class="d-flex flex-column gap-2">
                    <h5>Email ID Verification</h5>
                    <p class="sub_title">
                      All communication related to your account will be sent to
                      this email
                    </p>
                  </div>
                </div>
              </div>
            </div>
            <div class="desktop_css">
              <div class="line_css"></div>
            </div>
            <div class="col-lg-12 col-md-12 col-12">
              <div class="mobile_section">
                <div class="desktop_align">
                  <div class="email_screen">
                    <!-- <div class="google_btn" (click)="signInWithGoogle()" (keydown.enter)="signInWithGoogle()" (keydown.space)="signInWithGoogle()" role="button" tabindex="0"> -->
                    <button type="button" class="google_btn" (click)="signInWithGoogle()"
                      aria-label="Continue with Google — sign in with your Google account">
                      <span>
                        <img src="assets/images/diy/google_icon_mini.png" alt="Google Icon Mini Image"
                          aria-hidden="true" />
                      </span>
                      <span class="google_txt">Continue with Google</span>
                    </button>
                    <div class="desktop_css">
                      <img class="" src="assets/images/diy/or_sec_img.png" alt="" aria-hidden="true" />
                    </div>
                    <div class="mobile_css">
                      <img class="" src="assets/images/diy/or_sec_img_mobile.png" alt="" aria-hidden="true" />
                    </div>
                    <div class="email_text_section">
                      <h3 (click)="emailTextPage()" style="cursor: pointer">
                        Use another E-mail ID
                      </h3>
                      <h3>(Require OTP Verification)</h3>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
