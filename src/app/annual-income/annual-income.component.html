<section aria-label="Annual Income Selection" class="pan_details_form">
  <div class="container">
    <div class="row">
      <div class="col-lg-10 col-12 m-auto">
        <div class="mobile_css">
          <div class="back_cls">
            <div role="button" tabindex="0" (keydown.enter)="BackToTwo()" (keydown.space)="BackToTwo()" *ngIf="this.RejectStatus != 'R'" (click)="BackToTwo()" aria-label="Go back">
              <img src="assets/images/diy/ChevronLeft.png" alt="" aria-hidden="true"/> Back
            </div>

            <div *ngIf="this.RejectStatus === 'R'" class="back_cls2"></div>

            <div class="d-flex flex-column align-items-start gap-2">
              <h5>Annual Income</h5>
              <p class="sub_title">Select any one from the below</p>
            </div>
          </div>
        </div>

        <form aria-label="Annual Income Form" method="post">
          <div class="div">
            <div class="col-lg-12 col-md-12 col-12 desktop_css">
              <div class="d-flex align-items-start gap-2">
                <div role="button" tabindex="0" (keydown.enter)="BackToTwo()" (keydown.space)="BackToTwo()" *ngIf="this.RejectStatus != 'R'" (click)="BackToTwo()" aria-label="Go back">
                  <span>
                    <svg
                      width="24"
                      height="25"
                      viewBox="0 0 24 25"
                      fill="none"
                      xmlns="http://www.w3.org/2000/svg"
                    >
                      <g clip-path="url(#clip0_0_10804)">
                        <path
                          d="M5 12.5H19"
                          stroke="black"
                          stroke-width="1.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                        <path
                          d="M5 12.5L11 18.5"
                          stroke="black"
                          stroke-width="1.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                        <path
                          d="M5 12.5L11 6.5"
                          stroke="black"
                          stroke-width="1.5"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        />
                      </g>
                      <defs>
                        <clipPath id="clip0_0_10804">
                          <rect
                            width="24"
                            height="24"
                            fill="white"
                            transform="translate(0 0.5)"
                          />
                        </clipPath>
                      </defs>
                    </svg>
                  </span>
                </div>
                <div class="d-flex flex-column align-items-start gap-2">
                  <h5>Annual Income</h5>
                  <p class="sub_title">Select any one from the below</p>
                </div>
              </div>
            </div>
            <hr class="desktop_css" />
          </div>
          <div class="group_btn">
            <div *ngFor="let PersonalData of incomeResponse" class="form-check">
              <input class="form-check-input" type="radio" name="income" id="{{ PersonalData.incomeRange }}"
                [value]="PersonalData.incomeRange" [(ngModel)]="selectedIncome" (click)="
                  PersonalDetailsave('annualincome', PersonalData.incomeRange)
                " />
              <label class="form-check-label" for="{{ PersonalData.incomeRange }}">{{ PersonalData.incomeRange
                }}</label>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
